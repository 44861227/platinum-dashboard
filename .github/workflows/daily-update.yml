name: 每日铂金数据更新

on:
  # 每天北京时间 18:30 自动运行（UTC 10:30，对应A股收盘后）
  schedule:
    - cron: '30 10 * * 1-5'   # 周一至周五
  # 也可以手动触发（测试用）
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许写入仓库文件

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行数据抓取脚本
        run: python scraper.py

      - name: 提交并推送更新后的 data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "📊 自动更新铂金数据 $(date +'%Y-%m-%d')"
          git push
